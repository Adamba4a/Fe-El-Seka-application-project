upstream api_upstream {
    server api:8000;
}

upstream ai_upstream {
    server ai:8000;
}

upstream main_upstream {
    server main:3000;
}

server {
    listen 80;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/html text/css application/json application/javascript text/javascript;

    location /api/ {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal/ {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/ {
        proxy_pass http://ai_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://main_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# TLS termination — not needed for the Bunny Magic Containers deployment target:
# Bunny's CDN endpoint terminates public HTTPS at the edge (auto-provisioned
# Let's Encrypt cert for the custom domain) and this origin only needs to serve
# plain HTTP internally. Kept here, disabled, in case of a non-Bunny deploy target.
