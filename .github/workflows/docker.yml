name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-scan-api:
    name: Build & Scan API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          load: true
          tags: fe-el-seka-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: fe-el-seka-api:scan
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: false

  build-scan-ai:
    name: Build & Scan AI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AI image
        uses: docker/build-push-action@v5
        with:
          context: services/ai
          load: true
          tags: fe-el-seka-ai:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan AI image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: fe-el-seka-ai:scan
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: false

  build-scan-main:
    name: Build & Scan Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/main/Dockerfile
          load: true
          tags: fe-el-seka-main:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: fe-el-seka-main:scan
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: false

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build-scan-api, build-scan-ai, build-scan-main]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: true
          tags: |
            ghcr.io/adamba4a/fe-el-seka-api:latest
            ghcr.io/adamba4a/fe-el-seka-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push AI image
        uses: docker/build-push-action@v5
        with:
          context: services/ai
          push: true
          tags: |
            ghcr.io/adamba4a/fe-el-seka-ai:latest
            ghcr.io/adamba4a/fe-el-seka-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/main/Dockerfile
          push: true
          tags: |
            ghcr.io/adamba4a/fe-el-seka-main:latest
            ghcr.io/adamba4a/fe-el-seka-main:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
