name: CI

on:
  push:
    branches: [main, "0*-*"]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-typescript:
    name: TypeScript Apps
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck
      - run: pnpm turbo lint
      - run: pnpm turbo build

  ci-api:
    name: API Service
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest || [ "$?" -eq 5 ]

  ci-ai:
    name: AI Service
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest || [ "$?" -eq 5 ]
