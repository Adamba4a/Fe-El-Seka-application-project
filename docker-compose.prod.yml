services:
  api:
    image: ghcr.io/adamba4a/fe-el-seka-api:latest
    restart: always
    env_file: .env.prod
    networks:
      - fe-el-seka-prod
    deploy:
      resources:
        reservations:
          memory: 256M

  ai:
    image: ghcr.io/adamba4a/fe-el-seka-ai:latest
    restart: always
    env_file: .env.prod
    networks:
      - fe-el-seka-prod
    deploy:
      resources:
        reservations:
          memory: 512M

  main:
    image: ghcr.io/adamba4a/fe-el-seka-main:latest
    restart: always
    env_file: .env.prod
    networks:
      - fe-el-seka-prod
    deploy:
      resources:
        reservations:
          memory: 128M

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fe-el-seka-prod
    depends_on:
      - api
      - ai
      - main
    deploy:
      resources:
        reservations:
          memory: 64M

networks:
  fe-el-seka-prod:
    driver: bridge
