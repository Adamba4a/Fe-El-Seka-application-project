project_id = "fe-el-seka"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "5s"

# sign_in_with_otp({"email": ...}) uses this template for RETURNING users
# (an account already exists for that email). Without it, Supabase sends its
# default magic-link-only email (a link, no code) — the frontend expects a
# 6-digit code (see apps/main/src/app/(auth)/otp/page.tsx), so this template
# must render {{ .Token }}, not just {{ .ConfirmationURL }}.
[auth.email.template.magic_link]
subject = "Your Triplyy sign-in code"
content_path = "./supabase/templates/magic_link.html"

# sign_in_with_otp({"email": ...}) uses THIS template instead of magic_link
# for a BRAND NEW email (Supabase treats first-time OTP sign-in as a signup).
# The stock "Confirm signup" template's link redirects to redirect_to with an
# implicit-flow token in the URL fragment that this app never consumes,
# landing on "/" unauthenticated -> middleware bounces to /login -> the user
# clicks "sign in" again -> same new-signup path -> infinite loop. Rendering
# code-only here (no link) matches the code-entry flow at /otp.
[auth.email.template.confirmation]
subject = "Your Triplyy sign-in code"
content_path = "./supabase/templates/confirmation.html"

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your Triplyy OTP is {{ .Code }}"
max_frequency = "5s"

[analytics]
enabled = false
port = 54327
vector_port = 54328
